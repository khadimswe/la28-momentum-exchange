steps:
  # Step 1: Build Docker image with environment variables
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-repo/la28-momentum-exchange:latest'
      - '--build-arg'
      - 'VITE_GEMINI_API_KEY=${_VITE_GEMINI_API_KEY}'
      - '--build-arg'
      - 'VITE_FIREBASE_API_KEY=${_VITE_FIREBASE_API_KEY}'
      - '--build-arg'
      - 'VITE_FIREBASE_AUTH_DOMAIN=${_VITE_FIREBASE_AUTH_DOMAIN}'
      - '--build-arg'
      - 'VITE_FIREBASE_PROJECT_ID=${_VITE_FIREBASE_PROJECT_ID}'
      - '--build-arg'
      - 'VITE_FIREBASE_STORAGE_BUCKET=${_VITE_FIREBASE_STORAGE_BUCKET}'
      - '--build-arg'
      - 'VITE_FIREBASE_MESSAGING_SENDER_ID=${_VITE_FIREBASE_MESSAGING_SENDER_ID}'
      - '--build-arg'
      - 'VITE_FIREBASE_APP_ID=${_VITE_FIREBASE_APP_ID}'
      - '.'

  # Step 2: Push image to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-repo/la28-momentum-exchange:latest'

  # Step 3: Deploy to Cloud Run
  - name: 'gcr.io/cloud-builders/run'
    args:
      - 'deploy'
      - 'la28-momentum-exchange'
      - '--image'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-repo/la28-momentum-exchange:latest'
      - '--region'
      - 'us-central1'
      - '--allow-unauthenticated'
      - '--port'
      - '8080'
      - '--memory'
      - '512Mi'
      - '--cpu'
      - '1'

images:
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-repo/la28-momentum-exchange:latest'

options:
  machineType: 'E2_HIGHCPU_8'
  logging: CLOUD_LOGGING_ONLY

timeout: '1800s'

substitutions:
  _VITE_GEMINI_API_KEY: 'placeholder'
  _VITE_FIREBASE_API_KEY: 'placeholder'
  _VITE_FIREBASE_AUTH_DOMAIN: 'placeholder'
  _VITE_FIREBASE_PROJECT_ID: 'placeholder'
  _VITE_FIREBASE_STORAGE_BUCKET: 'placeholder'
  _VITE_FIREBASE_MESSAGING_SENDER_ID: 'placeholder'
  _VITE_FIREBASE_APP_ID: 'placeholder'
